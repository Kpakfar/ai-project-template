name: QA

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Language and toolchain setup. Substituted by /init-project from the
      # chosen language profile. The placeholder block becomes the right
      # `uses: ...` / `run: ...` steps (e.g. setup-uv + uv sync for Python,
      # setup-node + pnpm install for TypeScript).
      {{CI_SETUP_STEPS}}

      - name: Run quality gate
        run: {{QA_COMMAND}}
